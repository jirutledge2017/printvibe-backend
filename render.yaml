services:
  - type: web
    name: stipplecrown-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    # No persistent disk on the free plan — customer photo uploads to
    # public/uploads won't survive a restart/redeploy until you upgrade
    # to a paid plan and add a disk back. Everything else works fine.
    envVars:
      - key: PRINTFUL_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
